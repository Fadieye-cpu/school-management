{% extends "base.html" %}

{% block title %}Déconnexion - EPT{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
        <div class="p-5 bg-white shadow-sm rounded-4">
            <div class="mb-4 text-warning">
                <i class="bi bi-exclamation-circle" style="font-size: 3rem;"></i>
            </div>
            <h2 class="fw-bold text-dark mb-3">Déconnexion</h2>
            <p class="text-muted mb-4">Êtes-vous sûr de vouloir quitter votre session de maintenance ?</p>
            
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <button type="submit" class="btn btn-danger px-5 py-2 fw-bold shadow-sm">
                        Oui, me déconnecter
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary px-5 py-2 fw-bold">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
