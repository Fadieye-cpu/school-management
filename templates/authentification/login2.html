{% extends 'base.html' %}

{% block title %}Connexion - EPT{% endblock %}

{% block content %}

<div class="text-center mb-4">
    <div class="avatar bg-primary text-white rounded-circle d-inline-block p-3 mb-2">
        <i class="bi bi-person-check fs-4"></i>
    </div>
    <h5 class="fw-bold">{{ username }}</h5>
    <p class="text-muted small">Veuillez saisir votre mot de passe</p>
</div>

<form method="post">
    {% csrf_token %}
    <div class="mb-4">
        <input type="password" name="password" class="form-control bg-light" placeholder="Mot de passe" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Se connecter</button>
    <div class="text-center mt-3">
        <a href="{% url 'login1' %}" class="small text-decoration-none text-muted">Ce n'est pas vous ?</a>
    </div>
</form>

{% endblock %}
